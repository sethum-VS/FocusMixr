name: CI/CD — Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: focusmixr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint and production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build

  e2e-smoke:
    name: Playwright smoke tests
    needs: lint-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

  deploy:
    name: Deploy to Cloud Run
    needs: [lint-and-build, e2e-smoke]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME }}
      AR_REPO: ${{ secrets.GCP_AR_REPO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required APIs
        run: |
          gcloud services enable \
            artifactregistry.googleapis.com \
            cloudbuild.googleapis.com \
            run.googleapis.com \
            --project="${GCP_PROJECT_ID}"

      - name: Ensure Artifact Registry repository
        run: |
          if ! gcloud artifacts repositories describe "${AR_REPO}" \
            --project="${GCP_PROJECT_ID}" \
            --location="${GCP_REGION}" >/dev/null 2>&1; then
            gcloud artifacts repositories create "${AR_REPO}" \
              --project="${GCP_PROJECT_ID}" \
              --location="${GCP_REGION}" \
              --repository-format=docker \
              --description="FocusMixr container images"
          fi

      - name: Build and push image
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/${SERVICE_NAME}:${IMAGE_TAG}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"
          gcloud builds submit --project="${GCP_PROJECT_ID}" --tag "${IMAGE_URI}" .

      - name: Deploy to Cloud Run
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          ENV_FLAG=""
          if [ -n "${ELEVENLABS_API_KEY}" ]; then
            ENV_FLAG="--set-env-vars=ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}"
          fi

          gcloud run deploy "${SERVICE_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --image="${IMAGE_URI}" \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=5 \
            --memory=512Mi \
            --cpu=1 \
            --concurrency=80 \
            --timeout=60 \
            --port=8080 \
            ${ENV_FLAG}

      - name: Verify deployment health
        run: |
          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format='value(status.url)')"
          echo "Service URL: ${SERVICE_URL}"
          for attempt in $(seq 1 12); do
            if curl -fsS "${SERVICE_URL}/" -o /dev/null; then
              echo "Health check passed on attempt ${attempt}"
              exit 0
            fi
            echo "Attempt ${attempt}: not ready yet, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 2 minutes"
          exit 1
